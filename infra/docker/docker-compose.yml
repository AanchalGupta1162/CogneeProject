version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_ticket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - DATA_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/data
      - SYSTEM_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/system
      - CACHE_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/cache
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../..:/app
      - ../../.cognee_data:/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - DATA_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/data
      - SYSTEM_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/system
      - CACHE_ROOT_DIRECTORY=/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data/cache
    env_file:
      - ../../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../..:/app
      - ../../.cognee_data:/Users/harsh/VS Code/Cognee/smart-ticket/.cognee_data
    command: celery -A packages.infrastructure.redis_client:celery_app worker --loglevel=info --pool=threads

  # web:
  #   build:
  #     context: ../../apps/web
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000
  #   volumes:
  #     - ../../apps/web:/app
  #     - /app/node_modules

volumes:
  postgres_data:
